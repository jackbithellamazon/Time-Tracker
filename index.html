<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0a0a0a;
      --bg1:      #111111;
      --bg2:      #171717;
      --bg3:      #202020;
      --border:   #252525;
      --border2:  #2e2e2e;
      --text:     #e8e8e8;
      --text2:    #888;
      --text3:    #444;
      --green:    #22c55e;
      --red:      #ef4444;
      --accent:   #e8e8e8;
      --radius:   10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      padding: 24px 20px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      border-radius: 7px;
      font-size: 13px;
      flex-shrink: 0;
    }
    .time-display { text-align: right; }
    .time-display .date { font-size: 11px; color: var(--text3); margin-bottom: 1px; }
    .time-display .time { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }

    /* CONTROLS */
    .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
    .day-status { font-size: 12px; color: var(--text3); }

    /* BUTTONS */
    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border2);
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: var(--bg2);
      color: var(--text);
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg3); border-color: #3a3a3a; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-danger { background: transparent; border-color: #3a1a1a; color: #f87171; }
    .btn-danger:hover { background: #1a0a0a; border-color: #5a2a2a; }
    .btn-confirm { background: var(--green); border-color: var(--green); color: #000; font-weight: 600; }
    .btn-confirm:hover { background: #16a34a; border-color: #16a34a; }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 9px 18px;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      margin-bottom: -1px;
      color: var(--text3);
      font-size: 13px;
      font-weight: 500;
      transition: color 0.12s;
      user-select: none;
    }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    /* CONTENT */
    .content { display: none; position: relative; }
    .content.active { display: block; }

    /* LOCK */
    .lock {
      position: absolute; top: 0; left: 0; right: 0;
      min-height: 340px; height: 100%;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      overflow: hidden;
      background: var(--bg);
    }
    .lock.hidden { display: none; }
    .lock-bg-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 60%, rgba(99,102,241,0.18) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 30% at 30% 30%, rgba(236,72,153,0.10) 0%, transparent 60%),
                  radial-gradient(ellipse 40% 30% at 70% 20%, rgba(234,179,8,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .lock-box { text-align: center; max-width: 420px; padding: 20px; position: relative; z-index: 1; }
    .lock-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      margin-bottom: 20px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .lock-date {
      font-size: 16px;
      font-weight: 400;
      color: var(--text2);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    .lock-time-big {
      font-size: 96px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -6px;
      line-height: 1;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa 0%, #ec4899 40%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lock-seconds {
      font-size: 14px;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
      font-weight: 500;
    }
    .lock-yesterday {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 28px;
      min-height: 16px;
    }
    .lock-yesterday span { color: var(--text2); }
    .lock-btn {
      padding: 13px 40px;
      font-size: 14px;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 40px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, border-color 0.15s;
      backdrop-filter: blur(4px);
    }
    .lock-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.25); }

    /* ADD TASK */
    .add-task {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .add-task input, .add-task select {
      flex: 1;
      min-width: 120px;
      padding: 9px 12px;
      background: var(--bg1);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
    }
    .add-task input::placeholder { color: var(--text3); }
    .add-task input:focus, .add-task select:focus { outline: none; border-color: var(--border2); }
    .add-task select option { background: var(--bg2); }

    /* TILES */
    .tiles {
      position: relative;
      min-height: 360px;
      margin-bottom: 2rem;
    }
    .tile {
      position: absolute;
      width: 240px;
      padding: 16px 18px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: var(--tile-bg, var(--bg1));
      border-color: var(--tile-border, var(--border));
      transition: transform 0.12s, box-shadow 0.15s;
      user-select: none;
      cursor: default;
    }
    .tile:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .tile.dragging {
      box-shadow: 0 16px 48px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,255,255,0.15);
      z-index: 999;
      transform: scale(1.04) rotate(1deg);
      transition: none;
      opacity: 0.92;
      filter: brightness(1.1);
    }
    .tile.is-running {
      box-shadow: 0 0 0 1px var(--tile-color), 0 4px 24px rgba(0,0,0,0.4);
    }
    .tile-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
      background: var(--tile-color, transparent);
    }
    .tile-drag-handle {
      position: absolute;
      top: 9px; left: 9px;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: grab;
      color: rgba(255,255,255,0.65);
      font-size: 16px;
      font-weight: 900;
      transition: color 0.1s, background 0.1s;
      border-radius: 5px;
    }
    .tile-drag-handle:hover {
      color: rgba(255,255,255,0.95);
      background: rgba(0,0,0,0.25);
    }
    .tile-drag-handle:active { cursor: grabbing; }
    .tile.dragging .tile-drag-handle {
      color: #fff;
      background: rgba(0,0,0,0.35);
    }
    .tile-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--tile-text2);
      margin-bottom: 8px;
      margin-top: 14px;
      font-weight: 500;
    }
    .tile-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--tile-text);
      margin-bottom: 14px;
      line-height: 1.3;
    }
    .tile-time {
      font-size: 32px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1.5px;
      margin-bottom: 14px;
      color: var(--tile-text);
      line-height: 1;
      transition: opacity 0.2s;
    }
    .tile-time.stopped { opacity: 0.45; }
    .tile-btns { display: flex; gap: 6px; }
    .tile-btn {
      flex: 1;
      padding: 8px 8px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(0,0,0,0.2);
      color: rgba(255,255,255,0.75);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.1s, color 0.1s;
      letter-spacing: 0.02em;
    }
    .tile-btn:hover { background: rgba(0,0,0,0.4); color: #fff; }
    .tile-btn:active { transform: scale(0.97); }
    .tile-btn.start-btn { background: rgba(0,0,0,0.3); color: #fff; }
    .tile-btn.start-btn:hover { background: rgba(0,0,0,0.5); }
    .tile-btn.stop-btn { background: rgba(255,255,255,0.15); color: #fff; }
    .tile-btn.stop-btn:hover { background: rgba(255,255,255,0.25); }
    .tile-del { flex: 0 !important; padding: 8px 11px !important; opacity: 0.35; color: #fff !important; }
    .tile-del:hover { opacity: 0.85 !important; }
    .tile-running-dot {
      position: absolute; top: 11px; right: 13px;
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 2s infinite;
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
    }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }

    /* CARDS */
    .card {
      background: var(--bg1);
      padding: 18px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    /* ALLOCATE */
    .alloc-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 8px;
    }
    .alloc-tile {
      padding: 16px 18px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
      position: relative;
      user-select: none;
    }
    .alloc-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.45);
      filter: brightness(1.08);
    }
    .alloc-tile.open {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 6px 24px rgba(0,0,0,0.5);
    }
    .alloc-tile-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: rgba(255,255,255,0.55);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .alloc-tile-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .alloc-tile-targets {
      display: flex;
      gap: 12px;
    }
    .alloc-tile-kpi {
      flex: 1;
    }
    .alloc-tile-kpi-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }
    .alloc-tile-kpi-val {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .alloc-tile-kpi-unit {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      margin-left: 2px;
    }
    .alloc-tile-chevron {
      position: absolute;
      top: 14px; right: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      transition: transform 0.2s;
    }
    .alloc-tile.open .alloc-tile-chevron { transform: rotate(90deg); }
    .alloc-expand-block {
      display: none;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .alloc-expand-block.open { display: block; }
    .alloc-expand-header {
      display: grid;
      grid-template-columns: 1fr 90px 90px;
      gap: 8px;
      padding: 8px 16px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      border-bottom: 1px solid var(--border);
    }
    .alloc-expand-row {
      display: grid;
      grid-template-columns: 1fr 90px 90px;
      gap: 8px;
      padding: 9px 16px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .alloc-expand-row:last-child { border-bottom: none; }
    .alloc-expand-row.is-cat {
      background: var(--bg2);
    }
    .alloc-expand-name {
      font-size: 13px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alloc-expand-name.cat-name {
      font-weight: 600;
      color: var(--text);
    }
    .alloc-input {
      width: 100%;
      padding: 5px 8px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 13px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-family: inherit;
    }
    .alloc-input:focus { outline: none; border-color: var(--border2); }
    .alloc-input::placeholder { color: var(--text3); font-size: 12px; }
    .alloc-no-tasks { font-size: 12px; color: var(--text3); padding: 10px 16px; font-style: italic; }

    /* SETTINGS */
    .settings-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .settings-item input[type="color"] {
      width: 30px; height: 30px;
      border: 1px solid var(--border2);
      border-radius: 5px;
      cursor: pointer;
      padding: 2px;
      background: var(--bg2);
    }
    .settings-item input[type="text"] {
      flex: 1;
      background: transparent;
      color: var(--text);
      border: none;
      font-size: 13px;
      padding: 4px 0;
    }
    .settings-item input[type="text"]:focus { outline: none; }

    /* HISTORY */
    .week-section { margin-bottom: 36px; }
    .week-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .history-cats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .history-cat-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .history-tasks-list { font-size: 12px; color: var(--text2); }
    .history-task-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .history-task-row:last-child { border-bottom: none; }
    .history-note {
      margin-top: 10px;
      padding: 8px 10px;
      background: var(--bg2);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text2);
      font-style: italic;
      border-left: 2px solid var(--border2);
    }

    /* END OF DAY MODAL */
    .modal-overlay {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg1);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 28px 28px 24px;
      max-width: 520px;
      width: calc(100% - 32px);
      max-height: 88vh;
      overflow-y: auto;
    }
    .modal-header { margin-bottom: 20px; }
    .modal-header h2 { font-size: 17px; font-weight: 600; margin-bottom: 3px; }
    .modal-sub { font-size: 12px; color: var(--text3); }
    .eod-cat-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .eod-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .eod-cat-name { flex: 1; font-size: 13px; }
    .eod-cat-time { font-size: 13px; font-variant-numeric: tabular-nums; min-width: 50px; text-align: right; color: var(--text); }
    .eod-cat-target { font-size: 11px; min-width: 90px; text-align: right; }
    .eod-hit { color: var(--green); }
    .eod-miss { color: var(--red); }
    .eod-neutral { color: var(--text3); }
    .eod-total {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 14px 0 0;
      margin-top: 4px;
      font-size: 13px;
      color: var(--text2);
    }
    .eod-total span:last-child { font-size: 20px; font-weight: 700; color: var(--text); }
    .eod-tasks { margin-top: 20px; }
    .eod-tasks h3 { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .eod-task-row {
      display: flex; justify-content: space-between;
      font-size: 12px; padding: 5px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
    }
    .eod-task-row:last-child { border-bottom: none; }
    .eod-note-section { margin-top: 20px; }
    .eod-note-section label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 8px; }
    .eod-note-section textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      resize: vertical;
      min-height: 72px;
      font-family: inherit;
    }
    .eod-note-section textarea:focus { outline: none; border-color: var(--border2); }
    .eod-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* WEEKLY */
    .week-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .week-bar-label { font-size: 12px; min-width: 130px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .week-bar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .week-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .week-bar-val { font-size: 11px; font-variant-numeric: tabular-nums; min-width: 90px; text-align: right; color: var(--text3); }

    /* EMPTY */
    .empty { padding: 48px 20px; text-align: center; color: var(--text3); font-size: 13px; }
    .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.5; }

    /* SECTION TITLES */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      body { padding: 14px 12px; }
      .tiles { grid-template-columns: 1fr 1fr; gap: 8px; }
      .modal { padding: 20px; }
      .tab { padding: 8px 12px; font-size: 12px; }
      .lock-time-big { font-size: 36px; }
    }
    @media (max-width: 400px) {
      .tiles { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1><span class="logo-mark">⏱</span> Time Tracker</h1>
    <div class="time-display">
      <div class="date" id="date-display"></div>
      <div class="time" id="time-display"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn btn-danger" id="stop-day-btn" onclick="triggerStopDay()" disabled>End day</button>
    <span class="day-status" id="day-status">Day not started</span>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('tracker', this)">Tracker</div>
    <div class="tab" onclick="showTab('allocate', this)">Allocate</div>
    <div class="tab" onclick="showTab('history', this)">History</div>
    <div class="tab" onclick="showTab('weekly', this)">Weekly</div>
    <div class="tab" onclick="showTab('settings', this)">Settings</div>
  </div>

  <!-- TRACKER -->
  <div id="tracker" class="content active">
    <div class="lock" id="lock">

  <!-- SETTINGS -->

<div class="modal-overlay hidden" id="eod-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>End of day</h2>
      <div class="modal-sub" id="eod-date-sub"></div>
    </div>
    <div id="eod-cats"></div>
    <div class="eod-total" id="eod-total"></div>

      <h3>Task breakdown</h3>
      <div id="eod-task-list"></div>
    </div>

      <label>Reflection / notes for today</label>
      <textarea id="eod-note" placeholder="What got done? What drifted? What needs to change?"></textarea>
    </div>

      <button class="btn btn-confirm" onclick="saveAndEndDay()">Save & end day</button>
      <button class="btn" onclick="closeEodModal()">Cancel</button>

<script>
  // ─── COLOUR UTILS ────────────────────────────────────────────
  function colorWithAlpha(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // ─── LOCAL STORAGE LAYER (swap for Supabase later) ────────────
  const LS = {
    get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
    set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
  };

  // Seed default categories if first run
  if (!LS.get('tt_categories', null)) {
    LS.set('tt_categories', {
      'Business – Core': '#4f7cff',
      'Business – Admin': '#9b72f8',
      'Growth': '#0eab6c',
      'Personal': '#f59e0b',
      'Exercise': '#f26060',
      'Waste / Drift': '#e879a0'
    });
    LS.set('tt_targets', {});
    LS.set('tt_tasks', {});
    LS.set('tt_daily_logs', []);
    LS.set('tt_day_date', null);
  }

  let app = {
    dayStarted: false,
    dayDate: null,
    tasks: {},
    categories: {},
    catTargets: {},
    currentTask: null,
    timerInt: null
  };

  // ─── TIME UTILS ───────────────────────────────────────────────
  function fmtSec(s) {
    s = Math.max(0, Math.floor(s));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function fmtHours(s) {
    const h = s / 3600;
    if (h < 0.1) return `${Math.round(s/60)}m`;
    return `${h.toFixed(1)}h`;
  }

  function getElapsed(task) {
    let total = task.total_seconds || 0;
    if (task.start_time) {
      total += Math.floor((Date.now() - new Date(task.start_time).getTime()) / 1000);
    }
    return total;
  }

  function todayStr() {
    // Use the date the day was STARTED on, not current calendar date
    return app.dayDate || new Date().toLocaleDateString('en-CA');
  }

  function updateClock() {
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('date-display').textContent = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
    document.getElementById('time-display').textContent = `${hh}:${mm}`;
    const ld = document.getElementById('lock-date');
    const lt = document.getElementById('lock-time-big');
    const ls = document.getElementById('lock-seconds');
    if (ld) ld.textContent = dateStr;
    if (lt) lt.textContent = `${hh}:${mm}`;
    if (ls) ls.textContent = ss;
    // Show yesterday total on lock screen
    const ly = document.getElementById('lock-yesterday');
    if (ly) {
      const logs = LS.get('tt_daily_logs', []);
      if (logs.length > 0) {
        const last = logs[logs.length - 1];
        const lastDate = new Date(last.date + 'T12:00:00');
        const dayName = lastDate.toLocaleDateString('en-GB', { weekday: 'long' });
        ly.innerHTML = `${dayName}: <span>${fmtHours(last.total_seconds || 0)} tracked</span>`;
      }
    }
  }

  // ─── TABS ─────────────────────────────────────────────────────
  function showTab(name, el) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    if (el) el.classList.add('active');
    if (name === 'history') loadHistory();
    if (name === 'weekly') loadWeekly();
  }

  // ─── DAY START / STOP ─────────────────────────────────────────
  async function startDay() {
    app.dayStarted = true;
    // Store the date the day started on (not calendar date at stop time)
    if (!app.dayDate) {
      app.dayDate = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
      LS.set('tt_day_date', app.dayDate);
    }
    document.getElementById('lock').classList.add('hidden');
    document.getElementById('stop-day-btn').disabled = false;
    document.getElementById('day-status').textContent = 'Day in progress';
    startTicker();
  }

  function triggerStopDay() {
    buildEodModal();
    document.getElementById('eod-modal').classList.remove('hidden');
  }

  function closeEodModal() {
    document.getElementById('eod-modal').classList.add('hidden');
  }

  async function saveAndEndDay() {
    // Stop any running task first
    if (app.currentTask) await stopTask(app.currentTask, true);

    const note = document.getElementById('eod-note').value.trim();
    const today = todayStr();

    // Build category totals
    const catTotals = {};
    Object.values(app.tasks).forEach(t => {
      const s = getElapsed(t);
      catTotals[t.cat] = (catTotals[t.cat] || 0) + s;
    });

    const totalSec = Object.values(catTotals).reduce((a, b) => a + b, 0);

    // Build task breakdown JSON
    const taskBreakdown = Object.values(app.tasks).map(t => ({
      name: t.name,
      cat: t.cat,
      seconds: getElapsed(t)
    })).filter(t => t.seconds > 0);

    // Save to daily_logs
    const logData = {
      date: today,
      total_seconds: totalSec,
      cat_breakdown: catTotals,
      task_breakdown: taskBreakdown,
      notes: note || null,
      cat_targets: app.catTargets
    };

    const logs = LS.get('tt_daily_logs', []);
    const existingIdx = logs.findIndex(l => l.date === today);
    if (existingIdx >= 0) logs[existingIdx] = logData; else logs.push(logData);
    LS.set('tt_daily_logs', logs);

    // Reset task timers for new day
    Object.values(app.tasks).forEach(t => { t.total_seconds = 0; t.start_time = null; });
    saveTasks();

    closeEodModal();
    app.dayStarted = false;
    app.dayDate = null;
    LS.set('tt_day_date', null);
    app.currentTask = null;
    if (app.timerInt) { clearInterval(app.timerInt); app.timerInt = null; }
    document.getElementById('lock').classList.remove('hidden');
    document.getElementById('stop-day-btn').disabled = true;
    document.getElementById('day-status').textContent = 'Day saved ✓';
    await loadTasks();
  }

  function buildEodModal() {
    // Stop any running task display-wise
    const today = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('eod-date-sub').textContent = today;

    const catTotals = {};
    Object.values(app.tasks).forEach(t => {
      const s = getElapsed(t);
      catTotals[t.cat] = (catTotals[t.cat] || 0) + s;
    });

    const totalSec = Object.values(catTotals).reduce((a, b) => a + b, 0);

    // Category rows
    const catsEl = document.getElementById('eod-cats');
    catsEl.innerHTML = '';
    Object.entries(catTotals).sort((a,b) => b[1]-a[1]).forEach(([cat, sec]) => {
      const color = app.categories[cat] || '#666';
      const target = app.catTargets[cat];
      const targetSec = target ? (target.daily * 3600) : 0;
      let statusClass = 'eod-neutral';
      let statusText = targetSec > 0 ? `target: ${fmtHours(targetSec)}` : 'no target';
      if (targetSec > 0) {
        statusClass = sec >= targetSec ? 'eod-hit' : 'eod-miss';
        statusText = sec >= targetSec ? `✓ ${fmtHours(targetSec)} target hit` : `✗ ${fmtHours(targetSec)} target`;
      }
      catsEl.innerHTML += `
        <div class="eod-cat-row">
          <div class="eod-cat-dot" style="background:${color}"></div>
          <div class="eod-cat-name">${cat}</div>
          <div class="eod-cat-time">${fmtHours(sec)}</div>
          <div class="eod-cat-target ${statusClass}">${statusText}</div>
        </div>`;
    });

    document.getElementById('eod-total').innerHTML = `<span>Total time</span><span>${fmtHours(totalSec)}</span>`;

    // Task list
    const taskEl = document.getElementById('eod-task-list');
    taskEl.innerHTML = '';
    Object.values(app.tasks)
      .map(t => ({ ...t, elapsed: getElapsed(t) }))
      .filter(t => t.elapsed > 0)
      .sort((a, b) => b.elapsed - a.elapsed)
      .forEach(t => {
        const color = app.categories[t.cat] || '#666';
        taskEl.innerHTML += `
          <div class="eod-task-row">
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:8px;"></span>${t.name}</span>
            <span style="font-family:monospace;color:#888">${fmtHours(t.elapsed)}</span>
          </div>`;
      });

    document.getElementById('eod-note').value = '';
  }

  // ─── LOAD DATA ────────────────────────────────────────────────
  async function loadTasks() {
    app.categories = LS.get('tt_categories', {});
    app.catTargets = LS.get('tt_targets', {});
    app.tasks = LS.get('tt_tasks', {});
    app.dayDate = LS.get('tt_day_date', null);

    let anyRunning = false;
    Object.values(app.tasks).forEach(t => {
      if (t.start_time) { anyRunning = true; app.currentTask = t.id; }
    });

    if (anyRunning && !app.dayStarted) {
      app.dayStarted = true;
      document.getElementById('lock').classList.add('hidden');
      document.getElementById('stop-day-btn').disabled = false;
      document.getElementById('day-status').textContent = 'Day in progress';
      startTicker();
    }

    updateCatDropdown();
    renderTiles();
    renderAllocate();
    renderSettings();
  }

  function saveTasks() { LS.set('tt_tasks', app.tasks); }
  function saveCategories() { LS.set('tt_categories', app.categories); }
  function saveTargets() { LS.set('tt_targets', app.catTargets); }

  function updateCatDropdown() {
    const sel = document.getElementById('task-cat');
    const swatch = document.getElementById('cat-swatch');
    const prev = sel.value;
    sel.innerHTML = '';
    Object.entries(app.categories).forEach(([name, color]) => {
      const o = document.createElement('option');
      o.value = name;
      o.textContent = name;
      if (name === prev) o.selected = true;
      sel.appendChild(o);
    });
    const updateSwatchColor = () => {
      const color = app.categories[sel.value] || '#888';
      if (swatch) swatch.style.background = color;
      sel.style.borderColor = color + '88';
    };
    updateSwatchColor();
    sel.onchange = updateSwatchColor;
  }

  // ─── TICKER ───────────────────────────────────────────────────
  function startTicker() {
    if (app.timerInt) return;
    app.timerInt = setInterval(() => {
      Object.entries(app.tasks).forEach(([id, t]) => {
        const timeEl = document.querySelector(`.tile[data-id="${id}"] .tile-time`);
        if (timeEl) timeEl.textContent = fmtSec(getElapsed(t));
      });
    }, 1000);
  }

  // ─── GRID CONSTANTS ───────────────────────────────────────────
  const TILE_W = 252; // tile width + gap
  const TILE_H = 200; // tile height + gap (increased to prevent overlap)
  const TILE_COLS = () => Math.max(1, Math.floor((document.getElementById('tiles').offsetWidth + 12) / TILE_W));

  function gridPos(idx) {
    const cols = TILE_COLS();
    return { x: (idx % cols) * TILE_W, y: Math.floor(idx / cols) * TILE_H };
  }

  function snapToGrid(px, py) {
    const cols = TILE_COLS();
    const col = Math.max(0, Math.round(px / TILE_W));
    const row = Math.max(0, Math.round(py / TILE_H));
    return { x: col * TILE_W, y: row * TILE_H };
  }

  function updateContainerHeight() {
    const container = document.getElementById('tiles');
    const ids = Object.keys(app.tasks);
    if (ids.length === 0) { container.style.minHeight = '180px'; return; }
    let maxY = 0;
    ids.forEach(id => { const t = app.tasks[id]; maxY = Math.max(maxY, (t.y || 0) + TILE_H); });
    container.style.minHeight = (maxY + 20) + 'px';
  }

  // ─── RENDER TILES ─────────────────────────────────────────────
  function renderTiles() {
    const container = document.getElementById('tiles');
    const ids = Object.keys(app.tasks);
    if (ids.length === 0) {
      container.innerHTML = '<div class="empty" style="position:absolute;top:0;left:0;right:0;"><div class="empty-icon">📋</div>No tasks yet — add one above</div>';
      container.style.minHeight = '180px';
      return;
    }
    // Clear any empty state message before rendering tiles
    const emptyEl = container.querySelector('.empty');
    if (emptyEl) emptyEl.remove();

    // Assign positions to tasks that don't have one yet
    let needsSave = false;
    ids.forEach((id, idx) => {
      const t = app.tasks[id];
      if (t.x === undefined || t.y === undefined) {
        const pos = gridPos(idx);
        t.x = pos.x; t.y = pos.y;
        needsSave = true;
      }
    });
    if (needsSave) saveTasks();

    // Remove tiles that no longer exist, add new ones
    const existing = new Set([...container.querySelectorAll('.tile')].map(el => el.dataset.id));
    const current = new Set(ids);

    // Remove deleted
    existing.forEach(id => { if (!current.has(id)) container.querySelector(`[data-id="${id}"]`)?.remove(); });

    ids.forEach(id => {
      const t = app.tasks[id];
      const color = app.categories[t.cat] || '#6366f1';
      const isRunning = !!t.start_time;
      const elapsed = getElapsed(t);

      let tile = container.querySelector(`[data-id="${id}"]`);
      if (!tile) {
        tile = document.createElement('div');
        tile.className = 'tile';
        tile.dataset.id = id;
        container.appendChild(tile);
        initDrag(tile, id);
      }

      // Compute colour variants from category hex
      const bg = colorWithAlpha(color, 0.88);
      const bgDark = colorWithAlpha(color, 0.72);
      const border = colorWithAlpha(color, 0.5);

      tile.style.left = (t.x || 0) + 'px';
      tile.style.top = (t.y || 0) + 'px';
      tile.style.setProperty('--tile-color', color);
      tile.style.setProperty('--tile-bg', `linear-gradient(160deg, ${bg} 0%, ${bgDark} 100%)`);
      tile.style.setProperty('--tile-border', border);
      tile.style.setProperty('--tile-text', '#ffffff');
      tile.style.setProperty('--tile-text2', 'rgba(255,255,255,0.6)');
      tile.classList.toggle('is-running', isRunning);

      tile.innerHTML = `
        <div class="tile-accent"></div>
        <div class="tile-drag-handle" title="Drag to reorder">⠿</div>
        ${isRunning ? '<div class="tile-running-dot"></div>' : ''}
        <div class="tile-label">${t.cat}</div>
        <div class="tile-name">${t.name}</div>
        ${t.notes ? `<div style="font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:10px;margin-top:-8px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;">${t.notes}</div>` : ''}
        <div class="tile-time ${isRunning ? 'running' : 'stopped'}">${fmtSec(elapsed)}</div>
        <div class="tile-btns">
          ${!isRunning
            ? `<button class="tile-btn start-btn" onclick="startTask('${id}')">▶ Start</button>`
            : `<button class="tile-btn stop-btn" onclick="stopTask('${id}')">■ Stop</button>`
          }
          <button class="tile-btn" onclick="openEditModal('${id}')" style="flex:0;padding:7px 10px;opacity:0.6;" title="Edit task">✎</button>
        </div>`;

      // Attach drag via pointer events
      initDrag(tile, id);
    });

    updateContainerHeight();
  }

  // ─── DRAG (pointer events — works on mouse + touch) ──────────
  function initDrag(tile, id) {
    const handle = tile.querySelector('.tile-drag-handle');
    if (!handle) return;
    handle.addEventListener('pointerdown', (e) => startDrag(e, tile, id));
  }

  function startDrag(e, tile, id) {
    e.preventDefault();
    e.stopPropagation();

    const t = app.tasks[id];
    const container = document.getElementById('tiles');
    const containerRect = container.getBoundingClientRect();

    // Current position relative to container
    let curX = t.x || 0;
    let curY = t.y || 0;
    let lastX = e.clientX;
    let lastY = e.clientY;

    tile.classList.add('dragging');
    tile.setPointerCapture(e.pointerId);

    const onMove = (me) => {
      const dx = me.clientX - lastX;
      const dy = me.clientY - lastY;
      lastX = me.clientX;
      lastY = me.clientY;
      curX = Math.max(0, curX + dx);
      curY = Math.max(0, curY + dy);
      tile.style.left = curX + 'px';
      tile.style.top = curY + 'px';
    };

    const onUp = () => {
      tile.classList.remove('dragging');
      tile.style.zIndex = '';
      const snapped = snapToGrid(curX, curY);
      t.x = snapped.x;
      t.y = snapped.y;
      tile.style.left = snapped.x + 'px';
      tile.style.top = snapped.y + 'px';
      saveTasks();
      updateContainerHeight();
      tile.removeEventListener('pointermove', onMove);
      tile.removeEventListener('pointerup', onUp);
    };

    tile.addEventListener('pointermove', onMove);
    tile.addEventListener('pointerup', onUp);
  }

  // ─── TASK ACTIONS ─────────────────────────────────────────────
  async function addTask() {
    if (!app.dayStarted) return;
    const name = document.getElementById('task-name').value.trim();
    const cat = document.getElementById('task-cat').value;
    if (!name) return;
    const id = Date.now().toString();
    const idx = Object.keys(app.tasks).length;
    const cols = TILE_COLS();
    const pos = { x: (idx % cols) * TILE_W, y: Math.floor(idx / cols) * TILE_H };
    app.tasks[id] = { id, name, cat, color: app.categories[cat] || '#6366f1', total_seconds: 0, start_time: null, x: pos.x, y: pos.y };
    saveTasks();
    document.getElementById('task-name').value = '';
    renderTiles();
  }

  async function startTask(id) {
    if (!app.dayStarted) return;
    if (app.currentTask && app.currentTask !== id) await stopTask(app.currentTask, true);
    app.currentTask = id;
    app.tasks[id].start_time = new Date().toISOString();
    saveTasks();
    renderTiles();
    startTicker();
  }

  async function stopTask(id, silent = false) {
    const t = app.tasks[id];
    if (!t) return;
    t.total_seconds = getElapsed(t);
    t.start_time = null;
    if (app.currentTask === id) app.currentTask = null;
    saveTasks();
    if (!app.currentTask && app.timerInt) { clearInterval(app.timerInt); app.timerInt = null; }
    if (!silent) renderTiles();
  }

  async function deleteTask(id) {
    if (app.currentTask === id) await stopTask(id, true);
    delete app.tasks[id];
    saveTasks();
    renderTiles();
  }

  // ─── EDIT TASK ────────────────────────────────────────────────
  let editingTaskId = null;

  function openEditModal(id) {
    const t = app.tasks[id];
    if (!t) return;
    editingTaskId = id;

    document.getElementById('edit-task-name').value = t.name;
    document.getElementById('edit-task-notes').value = t.notes || '';

    // Populate category select
    const sel = document.getElementById('edit-task-cat');
    sel.innerHTML = '';
    Object.keys(app.categories).forEach(name => {
      const o = document.createElement('option');
      o.value = name; o.textContent = name;
      if (name === t.cat) o.selected = true;
      sel.appendChild(o);
    });

    document.getElementById('edit-modal').classList.remove('hidden');
    document.getElementById('edit-task-name').focus();
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.add('hidden');
    editingTaskId = null;
  }

  function saveEditTask() {
    if (!editingTaskId) return;
    const t = app.tasks[editingTaskId];
    if (!t) return;
    const name = document.getElementById('edit-task-name').value.trim();
    if (!name) return;
    t.name = name;
    t.cat = document.getElementById('edit-task-cat').value;
    t.notes = document.getElementById('edit-task-notes').value.trim();
    t.color = app.categories[t.cat] || t.color;
    saveTasks();
    closeEditModal();
    renderTiles();
    renderAllocate();
  }

  function deleteTaskFromEdit() {
    if (!editingTaskId) return;
    if (!confirm('Delete this task? This cannot be undone.')) return;
    deleteTask(editingTaskId);
    closeEditModal();
  }

  // ─── ALLOCATE ─────────────────────────────────────────────────
  const allocOpenCats = new Set();

  function safeId(str) {
    return str.replace(/[^a-zA-Z0-9]/g, '_');
  }

  function renderAllocate() {
    const list = document.getElementById('allocate-list');
    if (!list) return;
    list.innerHTML = '';

    // Tile grid
    const tileGrid = document.createElement('div');
    tileGrid.className = 'alloc-tiles';
    list.appendChild(tileGrid);

    // Expand blocks container
    const blocksContainer = document.createElement('div');
    list.appendChild(blocksContainer);

    Object.entries(app.categories).forEach(([catName, color]) => {
      const catTarget = app.catTargets[catName] || { weekly: '', daily: '' };
      const tasksInCat = Object.values(app.tasks).filter(t => t.cat === catName);
      const isOpen = allocOpenCats.has(catName);
      const sid = safeId(catName);

      // Build gradient from category colour
      const r = parseInt(color.slice(1,3),16);
      const g = parseInt(color.slice(3,5),16);
      const b = parseInt(color.slice(5,7),16);
      const bg = `linear-gradient(160deg, rgba(${r},${g},${b},0.88) 0%, rgba(${r},${g},${b},0.68) 100%)`;
      const border = `rgba(${r},${g},${b},0.5)`;

      // KPI tile
      const tile = document.createElement('div');
      tile.className = 'alloc-tile' + (isOpen ? ' open' : '');
      tile.id = 'alloc-tile-' + sid;
      tile.style.background = bg;
      tile.style.borderColor = border;
      tile.innerHTML = `
        <div class="alloc-tile-chevron">▶</div>
        <div class="alloc-tile-label">Category</div>
        <div class="alloc-tile-name">${catName}</div>
        <div class="alloc-tile-targets">
          <div class="alloc-tile-kpi">
            <div class="alloc-tile-kpi-label">Weekly</div>
            <div class="alloc-tile-kpi-val">${catTarget.weekly || '—'}<span class="alloc-tile-kpi-unit">${catTarget.weekly ? 'h' : ''}</span></div>
          </div>
          <div class="alloc-tile-kpi">
            <div class="alloc-tile-kpi-label">Daily</div>
            <div class="alloc-tile-kpi-val">${catTarget.daily || '—'}<span class="alloc-tile-kpi-unit">${catTarget.daily ? 'h' : ''}</span></div>
          </div>
        </div>`;
      tile.addEventListener('click', () => toggleAllocCat(catName));
      tileGrid.appendChild(tile);

      // Expand block
      const block = document.createElement('div');
      block.className = 'alloc-expand-block' + (isOpen ? ' open' : '');
      block.id = 'alloc-block-' + sid;
      block.style.borderTopColor = border;

      // Header row
      block.innerHTML = `
        <div class="alloc-expand-header">
          <div>Name</div>
          <div style="text-align:center;">Weekly (h)</div>
          <div style="text-align:center;">Daily (h)</div>
        </div>
        <div class="alloc-expand-row is-cat">
          <div class="alloc-expand-name cat-name">
            <span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${color};flex-shrink:0;"></span>
            ${catName} <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:4px;">total</span>
          </div>
          <div>
            <input class="alloc-input" type="number" min="0" step="0.5" placeholder="—"
              value="${catTarget.weekly || ''}"
              onchange="updateTarget('cat','${catName}','weekly',this.value)"
              onblur="updateTarget('cat','${catName}','weekly',this.value)">
          </div>
          <div>
            <input class="alloc-input" type="number" min="0" step="0.25" placeholder="—"
              value="${catTarget.daily || ''}"
              onchange="updateTarget('cat','${catName}','daily',this.value)"
              onblur="updateTarget('cat','${catName}','daily',this.value)">
          </div>
        </div>`;

      if (tasksInCat.length === 0) {
        block.innerHTML += `<div class="alloc-no-tasks">No tasks in this category yet — add them from the Tracker.</div>`;
      } else {
        tasksInCat.forEach(t => {
          const taskTarget = (app.catTargets['__tasks__'] || {})[t.id] || { weekly: '', daily: '' };
          block.innerHTML += `
            <div class="alloc-expand-row">
              <div class="alloc-expand-name">
                <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color};opacity:0.6;flex-shrink:0;"></span>
                ${t.name}
              </div>
              <div>
                <input class="alloc-input" type="number" min="0" step="0.5" placeholder="—"
                  value="${taskTarget.weekly || ''}"
                  onchange="updateTarget('task','${t.id}','weekly',this.value)"
                  onblur="updateTarget('task','${t.id}','weekly',this.value)">
              </div>
              <div>
                <input class="alloc-input" type="number" min="0" step="0.25" placeholder="—"
                  value="${taskTarget.daily || ''}"
                  onchange="updateTarget('task','${t.id}','daily',this.value)"
                  onblur="updateTarget('task','${t.id}','daily',this.value)">
              </div>
            </div>`;
        });
      }

      blocksContainer.appendChild(block);
    });
  }

  function toggleAllocCat(catName) {
    const sid = safeId(catName);
    const block = document.getElementById('alloc-block-' + sid);
    const tile = document.getElementById('alloc-tile-' + sid);
    const isOpen = allocOpenCats.has(catName);
    if (isOpen) {
      allocOpenCats.delete(catName);
      block.classList.remove('open');
      tile.classList.remove('open');
    } else {
      allocOpenCats.add(catName);
      block.classList.add('open');
      tile.classList.add('open');
    }
  }

  function updateTarget(type, key, field, val) {
    const v = val === '' ? '' : (parseFloat(val) || 0);
    if (type === 'cat') {
      if (!app.catTargets[key]) app.catTargets[key] = { weekly: '', daily: '' };
      app.catTargets[key][field] = v;
    } else {
      if (!app.catTargets['__tasks__']) app.catTargets['__tasks__'] = {};
      if (!app.catTargets['__tasks__'][key]) app.catTargets['__tasks__'][key] = { weekly: '', daily: '' };
      app.catTargets['__tasks__'][key][field] = v;
    }
    saveTargets();
    // Refresh tile KPI numbers without full re-render
    renderAllocate();
  }

  function updateCatTarget(name, type, val) {
    updateTarget('cat', name, type === 'w' ? 'weekly' : 'daily', val);
  }

  // ─── SETTINGS ─────────────────────────────────────────────────

  function clearAllTasks() {
    if (!confirm('Delete ALL tasks from the board? This cannot be undone.')) return;
    if (app.currentTask && app.timerInt) { clearInterval(app.timerInt); app.timerInt = null; }
    app.tasks = {}; app.currentTask = null;
    saveTasks();
    renderTiles();
    renderAllocate();
  }

  function clearAllHistory() {
    if (!confirm('Delete ALL history? This cannot be undone.')) return;
    LS.set('tt_daily_logs', []);
  }

  function resetEverything() {
    if (!confirm('Reset EVERYTHING — tasks, history, targets? Categories will be kept.')) return;
    app.tasks = {}; app.currentTask = null; app.catTargets = {};
    if (app.timerInt) { clearInterval(app.timerInt); app.timerInt = null; }
    saveTasks(); saveTargets();
    LS.set('tt_daily_logs', []);
    renderTiles(); renderAllocate(); renderSettings();
  }

  function updateCatColor(name, color) {
    app.categories[name] = color;
    saveCategories();
    renderTiles();
  }

  function renameCat(oldName, newName) {
    newName = newName.trim();
    if (!newName || newName === oldName) return;
    app.categories[newName] = app.categories[oldName];
    delete app.categories[oldName];
    if (app.catTargets[oldName]) { app.catTargets[newName] = app.catTargets[oldName]; delete app.catTargets[oldName]; }
    Object.values(app.tasks).forEach(t => { if (t.cat === oldName) t.cat = newName; });
    saveCategories(); saveTargets(); saveTasks();
    loadTasks();
  }

  function deleteCat(name) {
    if (Object.keys(app.categories).length <= 1) { alert('Must have at least one category'); return; }
    if (!confirm(`Delete category "${name}"? Tasks in this category won't be affected.`)) return;
    delete app.categories[name];
    delete app.catTargets[name];
    saveCategories(); saveTargets();
    loadTasks();
  }

  function addCategory() {
    const name = document.getElementById('new-cat-name').value.trim();
    const colorEl = document.getElementById('new-cat-color');
    if (!name || app.categories[name]) return;
    const color = colorEl ? colorEl.value : '#6366f1';
    app.categories[name] = color;
    app.catTargets[name] = { weekly: '', daily: '' };
    saveCategories(); saveTargets();
    document.getElementById('new-cat-name').value = '';
    loadTasks();
  }

  // ─── HISTORY ACTIONS ──────────────────────────────────────────
  function deleteHistoryDay(date) {
    if (!confirm('Delete this day from history? This cannot be undone.')) return;
    const logs = LS.get('tt_daily_logs', []).filter(l => l.date !== date);
    LS.set('tt_daily_logs', logs);
    loadHistory();
  }

  function editHistoryNote(date) {
    const logs = LS.get('tt_daily_logs', []);
    const log = logs.find(l => l.date === date);
    if (!log) return;
    const current = log.notes || '';
    const newNote = prompt('Edit reflection for this day:', current);
    if (newNote === null) return; // cancelled
    log.notes = newNote.trim();
    LS.set('tt_daily_logs', logs);
    loadHistory();
  }

  // ─── HISTORY ──────────────────────────────────────────────────
  async function loadHistory() {
    const logs = LS.get('tt_daily_logs', []).sort((a,b) => b.date.localeCompare(a.date)).slice(0, 60);
    const el = document.getElementById('history-content');

    if (!logs || logs.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📅</div>No history yet — complete your first day to see it here</div>';
      return;
    }

    // Group by week
    const weeks = {};
    logs.forEach(log => {
      const d = new Date(log.date + 'T12:00:00');
      const monday = new Date(d);
      monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
      const wk = monday.toISOString().slice(0, 10);
      if (!weeks[wk]) weeks[wk] = [];
      weeks[wk].push(log);
    });

    el.innerHTML = '';
    Object.entries(weeks).forEach(([weekStart, weekLogs]) => {
      const weekEnd = new Date(weekStart + 'T12:00:00');
      weekEnd.setDate(weekEnd.getDate() + 6);
      const wLabel = `Week of ${new Date(weekStart + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })} – ${weekEnd.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}`;

      const weekTotal = weekLogs.reduce((s, l) => s + (l.total_seconds || 0), 0);

      const sec = document.createElement('div');
      sec.className = 'week-section';
      sec.innerHTML = `<div class="week-label">${wLabel} &mdash; ${fmtHours(weekTotal)} total</div>`;

      weekLogs.forEach(log => {
        const d = new Date(log.date + 'T12:00:00');
        const dateLabel = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
        const cats = log.cat_breakdown || {};
        const tasks = log.task_breakdown || [];

        const day = document.createElement('div');
        day.className = 'history-day card';
        day.style.marginBottom = '12px';

        let catBadges = Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat, sec]) => {
          const color = (log.cat_targets && log.cat_targets[cat] ? app.categories[cat] : null) || app.categories[cat] || '#555';
          return `<span class="history-cat-badge" style="background:${color}22;border:0.5px solid ${color}55;color:${color}">
            ${cat}: ${fmtHours(sec)}
          </span>`;
        }).join('');

        let taskRows = tasks.sort((a,b)=>b.seconds-a.seconds).map(t =>
          `<div class="history-task-row"><span>${t.name} <span style="font-size:11px;color:#555;">${t.cat}</span></span><span style="font-family:monospace;">${fmtHours(t.seconds)}</span></div>`
        ).join('');

        const logDate = log.date;
        day.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="color:var(--text);font-size:15px;font-weight:600;">${dateLabel}</div>
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="font-variant-numeric:tabular-nums;font-size:14px;color:var(--text2);">${fmtHours(log.total_seconds||0)}</div>
              <button onclick="editHistoryNote('${logDate}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:4px;" title="Edit note">✎</button>
              <button onclick="deleteHistoryDay('${logDate}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:4px;" title="Delete this day">✕</button>
            </div>
          </div>
          <div class="history-cats">${catBadges}</div>
          <div class="history-tasks-list">${taskRows}</div>
          <div id="hist-note-${logDate}">
            ${log.notes ? `<div class="history-note">"${log.notes}"</div>` : `<div style="font-size:12px;color:var(--text3);margin-top:6px;cursor:pointer;" onclick="editHistoryNote('${logDate}')">+ Add note</div>`}
          </div>
        `;
        sec.appendChild(day);
      });
      el.appendChild(sec);
    });
  }

  // ─── WEEKLY ───────────────────────────────────────────────────
  function getMonday(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1 - day);
    d.setDate(d.getDate() + diff);
    d.setHours(0,0,0,0);
    return d;
  }

  function toLocalDateStr(date) {
    return date.toLocaleDateString('en-CA'); // YYYY-MM-DD
  }

  async function loadWeekly() {
    const el = document.getElementById('weekly-content');
    const allLogs = LS.get('tt_daily_logs', []);

    // Get current Mon–Sun week
    const now = new Date();
    const monday = getMonday(now);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);

    const weekStart = toLocalDateStr(monday);
    const weekEnd = toLocalDateStr(sunday);

    const weekLogs = allLogs
      .filter(l => l.date >= weekStart && l.date <= weekEnd)
      .sort((a,b) => a.date.localeCompare(b.date));

    // Build full Mon–Sun map (7 days, fill gaps with 0)
    const dayMap = {};
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      dayMap[toLocalDateStr(d)] = 0;
    }
    weekLogs.forEach(l => { dayMap[l.date] = l.total_seconds || 0; });

    const workedDays = Object.values(dayMap).filter(s => s > 0).length;
    const totalSec = Object.values(dayMap).reduce((a,b) => a+b, 0);
    const avgPerWorkedDay = workedDays > 0 ? totalSec / workedDays : 0;

    // Category totals
    const catTotals = {};
    weekLogs.forEach(log => {
      Object.entries(log.cat_breakdown || {}).forEach(([cat, sec]) => {
        catTotals[cat] = (catTotals[cat] || 0) + sec;
      });
    });
    const maxCatSec = Math.max(...Object.values(catTotals), 1);

    // Week label
    const weekLabel = `${monday.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${sunday.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;

    el.innerHTML = '';

    // ── HEADER STATS ──
    const header = document.createElement('div');
    header.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;';
    const stats = [
      { label: 'This week', val: fmtHours(totalSec), sub: weekLabel },
      { label: 'Days worked', val: `${workedDays}/7`, sub: workedDays === 0 ? 'No data yet' : workedDays < 6 ? 'On track' : 'Full week' },
      { label: 'Avg per day', val: workedDays > 0 ? fmtHours(avgPerWorkedDay) : '—', sub: 'Worked days only' },
      { label: 'Categories', val: Object.keys(catTotals).length, sub: 'Active this week' },
    ];
    stats.forEach(s => {
      header.innerHTML += `
        <div style="background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">${s.label}</div>
          <div style="font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;margin-bottom:2px;">${s.val}</div>
          <div style="font-size:11px;color:var(--text3);">${s.sub}</div>
        </div>`;
    });
    el.appendChild(header);

    // ── DAY BARS Mon–Sun ──
    const dayCard = document.createElement('div');
    dayCard.className = 'card';
    dayCard.style.marginBottom = '16px';
    dayCard.innerHTML = '<div class="section-title" style="margin-bottom:14px;">Mon — Sun</div>';

    const maxDay = Math.max(...Object.values(dayMap), 1);
    const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    let barHtml = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;align-items:flex-end;">';
    Object.entries(dayMap).forEach(([date, sec], i) => {
      const pct = Math.round((sec / maxDay) * 100);
      const isToday = date === toLocalDateStr(now);
      const isFuture = date > toLocalDateStr(now);
      const barColor = isFuture ? 'var(--border)' : isToday ? '#a78bfa' : 'var(--text3)';
      barHtml += `
        <div style="text-align:center;">
          <div style="height:60px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:5px;">
            <div style="width:100%;border-radius:3px 3px 0 0;background:${barColor};height:${Math.max(pct,isFuture?3:sec>0?3:0)}%;min-height:${sec>0?4:0}px;transition:height 0.3s;"></div>
          </div>
          <div style="font-size:11px;color:${isToday?'#a78bfa':isFuture?'var(--text3)':'var(--text2)'};font-weight:${isToday?'600':'400'};">${dayNames[i]}</div>
          <div style="font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;margin-top:1px;">${sec>0?fmtHours(sec):''}</div>
        </div>`;
    });
    barHtml += '</div>';
    dayCard.innerHTML += barHtml;

    if (workedDays === 0) {
      dayCard.innerHTML += `<div style="text-align:center;padding:16px 0 4px;font-size:13px;color:var(--text3);">No data logged this week yet.</div>`;
    }
    el.appendChild(dayCard);

    if (workedDays === 0) return;

    // ── CATEGORY BREAKDOWN ──
    const catCard = document.createElement('div');
    catCard.className = 'card';
    catCard.style.marginBottom = '16px';
    catCard.innerHTML = '<div class="section-title" style="margin-bottom:14px;">Where your time went</div>';

    Object.entries(catTotals).sort((a,b) => b[1]-a[1]).forEach(([cat, sec]) => {
      const color = app.categories[cat] || '#666';
      const target = app.catTargets[cat];
      const targetSec = target && target.weekly ? (parseFloat(target.weekly) * 3600) : 0;
      const pct = targetSec > 0 ? Math.min(100, (sec/targetSec)*100) : (sec/maxCatSec)*100;
      const hit = targetSec > 0 && sec >= targetSec;
      const over = targetSec > 0 && sec > targetSec * 1.1;
      const barColor = targetSec === 0 ? color : hit ? '#22c55e' : '#ef4444';
      const pctOfTotal = totalSec > 0 ? Math.round((sec/totalSec)*100) : 0;

      catCard.innerHTML += `
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;">
            <div style="display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text);">
              <span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${color};"></span>
              ${cat}
              <span style="font-size:11px;color:var(--text3);">${pctOfTotal}% of week</span>
            </div>
            <div style="font-size:13px;font-variant-numeric:tabular-nums;color:${targetSec>0?(hit?'#22c55e':'#ef4444'):'var(--text2)'};">
              ${fmtHours(sec)}${targetSec > 0 ? ` / ${fmtHours(targetSec)}` : ''}
              ${targetSec > 0 ? (hit ? ' ✓' : ' ✗') : ''}
            </div>
          </div>
          <div style="height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${pct.toFixed(1)}%;background:${barColor};border-radius:4px;transition:width 0.4s;"></div>
          </div>
          ${over ? `<div style="font-size:11px;color:#f59e0b;margin-top:3px;">⚠ ${fmtHours(sec - targetSec)} over target — worth reviewing why</div>` : ''}
        </div>`;
    });
    el.appendChild(catCard);

    // ── INSIGHTS ──
    const insights = [];
    const topCat = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
    if (topCat) {
      const pct = Math.round((topCat[1]/totalSec)*100);
      insights.push(`<strong>${topCat[0]}</strong> took up ${pct}% of your week — ${pct > 50 ? 'heavily dominant, check if that was intentional' : 'your biggest category'}.`);
    }
    const wasteKey = Object.keys(catTotals).find(k => k.toLowerCase().includes('waste') || k.toLowerCase().includes('drift'));
    if (wasteKey && catTotals[wasteKey] > 3600) {
      insights.push(`<strong>${wasteKey}</strong>: ${fmtHours(catTotals[wasteKey])} logged — if this wasn't planned, it's worth investigating.`);
    }
    const missedTargets = Object.entries(app.catTargets)
      .filter(([cat, t]) => t.weekly && catTotals[cat] !== undefined && catTotals[cat] < parseFloat(t.weekly)*3600*0.8)
      .map(([cat]) => cat);
    if (missedTargets.length) insights.push(`Targets missed by 20%+: <strong>${missedTargets.join(', ')}</strong>.`);
    if (workedDays === 7) insights.push('You worked all 7 days this week. Make sure you are taking proper rest.');
    if (workedDays <= 4 && totalSec > 0) insights.push(`Only ${workedDays} days worked — all your hours are concentrated. That's fine if intentional.`);

    if (insights.length) {
      const insightCard = document.createElement('div');
      insightCard.className = 'card';
      insightCard.innerHTML = `<div class="section-title" style="margin-bottom:12px;">Insights</div>` +
        insights.map(i => `<div style="font-size:13px;color:var(--text2);padding:8px 0;border-bottom:1px solid var(--border);line-height:1.5;">${i}</div>`).join('');
      el.appendChild(insightCard);
    }
  }

  // ─── INIT ─────────────────────────────────────────────────────
  updateClock();
  setInterval(updateClock, 1000);
  window.addEventListener('resize', () => { renderTiles(); });
  loadTasks();
</script>
</body>
</html>
