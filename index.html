<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .header h1 { font-size: 28px; }
    .time-display { text-align: right; }
    .time-display .date { font-size: 12px; color: #999; }
    .time-display .time { font-size: 32px; font-weight: bold; }
    .controls { display: flex; gap: 12px; margin-bottom: 2rem; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .btn-primary { background: #ef4444; color: white; }
    .btn-secondary { background: #333; color: #e5e5e5; }
    .tabs { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 1px solid #333; }
    .tab { padding: 12px 24px; cursor: pointer; border-bottom: 2px solid transparent; color: #999; }
    .tab.active { color: #e5e5e5; border-bottom-color: #3b82f6; }
    .content { display: none; position: relative; }
    .content.active { display: block; }
    .lock { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .lock.hidden { display: none; }
    .lock-box { text-align: center; }
    .lock-title { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #ec4899, #f97316, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; }
    .lock-btn { padding: 16px 48px; font-size: 18px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .add-task { display: flex; gap: 12px; margin-bottom: 2rem; flex-wrap: wrap; }
    .add-task input, .add-task select { flex: 1; min-width: 150px; padding: 12px; background: #1a1a1a; color: #e5e5e5; border: 0.5px solid #333; border-radius: 8px; font-size: 14px; }
    .add-task button { padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 2rem; }
    .tile { padding: 20px; border-radius: 12px; position: relative; }
    .tile-head { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .tile-label { font-size: 11px; text-transform: uppercase; opacity: 0.8; }
    .tile-handle { background: rgba(255,255,255,0.1); border: none; color: #e5e5e5; cursor: move; padding: 6px; border-radius: 6px; }
    .tile-name { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .tile-time { font-size: 36px; font-family: monospace; margin-bottom: 16px; }
    .tile-btns { display: grid; gap: 8px; }
    .tile-btn { padding: 10px; background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2); color: #e5e5e5; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .tile-btn:hover { background: rgba(255,255,255,0.2); }
    .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card { background: #1a1a1a; padding: 16px; border-radius: 8px; border: 0.5px solid #333; }
    .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⏱️ Time Tracker</h1>
      <div class="time-display">
        <div class="date" id="date"></div>
        <div class="time" id="time"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="stop-btn" onclick="stopDay()" disabled>Stop day</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('tracker')">Tracker</div>
      <div class="tab" onclick="showTab('allocate')">Allocate</div>
      <div class="tab" onclick="showTab('settings')">Settings</div>
      <div class="tab" onclick="showTab('history')">History</div>
    </div>

    <!-- TRACKER with LOCK -->
    <div id="tracker" class="content active">
      <div class="lock" id="lock">
        <div class="lock-box">
          <div class="lock-title">Ready to start your day?</div>
          <button class="lock-btn" onclick="startDay()">Let's go</button>
        </div>
      </div>
      <div class="add-task">
        <input type="text" id="task-name" placeholder="Task name">
        <select id="task-cat">
          <option value="Business – Core">Business – Core</option>
          <option value="Business – Admin">Business – Admin</option>
          <option value="Growth">Growth</option>
          <option value="Personal">Personal</option>
          <option value="Exercise">Exercise</option>
          <option value="Waste / Drift">Waste / Drift</option>
        </select>
        <button class="btn btn-primary" onclick="addTask()">+ Add</button>
      </div>
      <div class="tiles" id="tiles"></div>
    </div>

    <!-- ALLOCATE -->
    <div id="allocate" class="content">
      <div id="allocate-grid"></div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="content">
      <div id="settings-content"></div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="content">
      <div id="history-grid"></div>
    </div>
  </div>

  <script>
    const SB = supabase.createClient('https://ffbdazepqrsyurhouxif.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmYmRhemVwcXJzeXVyaG91eGlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTM5MjIsImV4cCI6MjA5MDQ2OTkyMn0.BAuodLUDGzO9A7IfoRRn0HZ1MgWOXNPeYKPDBNaNWeg');
    
    let app = { dayStarted: false, tasks: {}, categories: {}, catTargets: {}, currentTask: null, timerInt: null };

    function updateTime() {
      const now = new Date();
      document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
      document.getElementById('time').textContent = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    function fmt(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    function showTab(name) {
      document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      event.target.classList.add('active');
    }

    async function startDay() {
      app.dayStarted = true;
      document.getElementById('lock').classList.add('hidden');
      document.getElementById('stop-btn').disabled = false;
      await loadTasks();
    }

    function stopDay() {
      app.dayStarted = false;
      document.getElementById('lock').classList.remove('hidden');
      document.getElementById('stop-btn').disabled = true;
    }

    async function loadTasks() {
      const {data} = await SB.from('tasks').select('*');
      const {data:cats} = await SB.from('categories').select('*');
      const {data:catTargs} = await SB.from('category_targets').select('*');
      
      app.categories = {};
      if(cats) cats.forEach(c => app.categories[c.name] = c.color);
      
      app.catTargets = {};
      if(catTargs) catTargs.forEach(t => app.catTargets[t.category] = {weekly: t.weekly_hours, daily: t.daily_minimum});
      
      app.tasks = {};
      if(data) {
        data.forEach(t => {
          app.tasks[t.id] = {id:t.id, name:t.name, cat:t.category, sec:0, color:t.color, start_time:t.start_time, notes:t.notes, output:t.output, weekly:t.weekly_hours, daily:t.daily_minimum};
          if(t.start_time) app.dayStarted = true;
        });
      }
      
      // Update category dropdown
      const select = document.getElementById('task-cat');
      select.innerHTML = '';
      Object.keys(app.categories).forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      
      renderTiles();
      renderAllocate();
      renderSettings();
      if(app.dayStarted) document.getElementById('lock').classList.add('hidden');
    }

    function renderTiles() {
      const tiles = document.getElementById('tiles');
      tiles.innerHTML = '';
      Object.entries(app.tasks).forEach(([id, t]) => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.dataset.id = id;
        const color = app.categories[t.cat] || '#3b82f6';
        tile.style.background = `linear-gradient(135deg, ${color}, ${color}dd)`;
        
        let elapsed = 0;
        if(t.start_time) {
          elapsed = Math.floor((new Date() - new Date(t.start_time)) / 1000);
        }
        
        tile.innerHTML = `
          <div class="tile-head">
            <div class="tile-label">${t.cat}</div>
            <button class="tile-handle">⋮⋮</button>
          </div>
          <div class="tile-name">${t.name}</div>
          <div class="tile-time">${fmt(elapsed)}</div>
          <div class="tile-btns">
            <button class="tile-btn" onclick="startTask(${id})">Start</button>
            <button class="tile-btn" onclick="stopTask(${id})">Stop</button>
            <button class="tile-btn" onclick="deleteTask(${id})">Delete</button>
          </div>
        `;
        tiles.appendChild(tile);
      });
    }

    function renderAllocate() {
      const grid = document.getElementById('allocate-grid');
      grid.innerHTML = '<h2 style="grid-column: 1/-1; margin-bottom: 2rem;">Category Targets</h2>';
      Object.entries(app.categories).forEach(([name, color]) => {
        const target = app.catTargets[name] || {weekly: 0, daily: 0};
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
            <div style="width: 16px; height: 16px; background: ${color}; border-radius: 4px;"></div>
            <div style="font-weight: 600;">${name}</div>
          </div>
          <div style="margin-bottom: 8px;">
            <label style="font-size: 12px; color: #999;">Weekly target (hours)</label>
            <input type="number" value="${target.weekly}" onchange="updateCatTarget('${name}', 'w', this.value)" style="width: 100%; padding: 8px; background: #0f0f0f; color: #e5e5e5; border: 0.5px solid #333; border-radius: 4px; margin-top: 4px;">
          </div>
          <div>
            <label style="font-size: 12px; color: #999;">Daily minimum (hours)</label>
            <input type="number" value="${target.daily}" onchange="updateCatTarget('${name}', 'd', this.value)" style="width: 100%; padding: 8px; background: #0f0f0f; color: #e5e5e5; border: 0.5px solid #333; border-radius: 4px; margin-top: 4px;">
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function renderSettings() {
      const settings = document.getElementById('settings-content');
      settings.innerHTML = '<h2 style="margin-bottom: 2rem;">Categories</h2>';
      Object.entries(app.categories).forEach(([name, color]) => {
        const item = document.createElement('div');
        item.style.cssText = 'display:flex; align-items:center; gap:12px; padding:12px; background:#1a1a1a; border:0.5px solid #333; border-radius:8px; margin-bottom:8px;';
        item.innerHTML = `
          <input type="color" value="${color}" onchange="updateCatColor('${name}', this.value)" style="width:40px; height:40px; border:none; border-radius:6px; cursor:pointer;">
          <input type="text" value="${name}" style="flex:1; background:#0f0f0f; color:#e5e5e5; border:0.5px solid #333; padding:8px; border-radius:6px; font-size:14px;" onchange="renameCat('${name}', this.value)">
          <button class="btn btn-primary" onclick="deleteCat('${name}')" style="padding: 8px 16px;">Delete</button>
        `;
        settings.appendChild(item);
      });
      
      const addDiv = document.createElement('div');
      addDiv.style.cssText = 'margin-top: 2rem; display: flex; gap: 12px;';
      addDiv.innerHTML = `
        <input type="text" id="new-cat-name" placeholder="New category name" style="flex: 1; padding: 12px; background: #1a1a1a; color: #e5e5e5; border: 0.5px solid #333; border-radius: 8px;">
        <button class="btn btn-primary" onclick="addCategory()" style="padding: 12px 24px;">+ Add</button>
      `;
      settings.appendChild(addDiv);
    }

    function addTask() {
      if(!app.dayStarted) return;
      const name = document.getElementById('task-name').value.trim();
      const cat = document.getElementById('task-cat').value;
      if(!name) return;
      
      SB.from('tasks').insert({name, category:cat, color:app.categories[cat]||'#3b82f6'}).then(() => {
        document.getElementById('task-name').value = '';
        loadTasks();
      });
    }

    function startTask(id) {
      if(!app.dayStarted) return;
      if(app.currentTask && app.currentTask !== id) stopTask(app.currentTask);
      app.currentTask = id;
      const now = new Date().toISOString();
      app.tasks[id].start_time = now;
      SB.from('tasks').update({start_time: now}).eq('id', id);
      
      if(!app.timerInt) {
        app.timerInt = setInterval(() => {
          renderTiles();
        }, 1000);
      }
    }

    function stopTask(id) {
      if(app.currentTask === id) {
        app.currentTask = null;
        if(app.timerInt) clearInterval(app.timerInt);
        app.timerInt = null;
      }
      SB.from('tasks').update({start_time: null}).eq('id', id);
      renderTiles();
    }

    function deleteTask(id) {
      SB.from('tasks').delete().eq('id', id).then(() => loadTasks());
    }

    function updateCatColor(name, color) {
      app.categories[name] = color;
      SB.from('categories').update({color}).eq('name', name).then(() => {
        Object.values(app.tasks).forEach(t => { if(t.cat === name) t.color = color; });
        renderTiles();
        renderAllocate();
        renderSettings();
      });
    }

    function renameCat(oldName, newName) {
      if(!newName.trim()) return;
      SB.from('categories').update({name: newName}).eq('name', oldName).then(() => {
        SB.from('category_targets').update({category: newName}).eq('category', oldName);
        loadTasks();
      });
    }

    function deleteCat(name) {
      if(Object.keys(app.categories).length <= 1) { alert('Must have at least one category'); return; }
      SB.from('categories').delete().eq('name', name).then(() => loadTasks());
    }

    function addCategory() {
      const name = document.getElementById('new-cat-name').value.trim();
      if(!name) return;
      SB.from('categories').insert({name, color:'#999'}).then(() => {
        SB.from('category_targets').insert({category:name, weekly_hours:0, daily_minimum:0}).then(() => {
          loadTasks();
          document.getElementById('new-cat-name').value = '';
        });
      });
    }

    function updateCatTarget(name, type, val) {
      if(!app.catTargets[name]) app.catTargets[name] = {weekly: 0, daily: 0};
      if(type === 'w') app.catTargets[name].weekly = parseFloat(val) || 0;
      else app.catTargets[name].daily = parseFloat(val) || 0;
      SB.from('category_targets').update({
        weekly_hours: app.catTargets[name].weekly,
        daily_minimum: app.catTargets[name].daily
      }).eq('category', name);
    }

    updateTime();
    setInterval(updateTime, 1000);
    loadTasks();
  </script>
</body>
</html>
